<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <title>PilotGarage</title>
    <script>
      // GitHub Pages SPA fallback — encodes the path as a query string and
      // redirects to index.html, which restores it (see index.html).
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1 // "/PilotGarage"
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
