name: Supabase keepalive

# Supabase free tier pauses projects after 7 idle days — ping every 6.
# The anon query returns zero rows via RLS; the round trip itself is
# what counts as activity.

on:
  schedule:
    - cron: '17 9 */6 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping database
        run: |
          curl --fail --silent --show-error \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/businesses?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            > /dev/null
          echo "Supabase pinged."
